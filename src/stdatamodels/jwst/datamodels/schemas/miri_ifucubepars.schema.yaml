%YAML 1.1
---
$schema: "http://stsci.edu/schemas/asdf/asdf-schema-1.1.0"
id: "http://stsci.edu/schemas/jwst_datamodel/miri_ifucubepars.schema"
title: Default MIRI IFU cube parameters data model
allOf:
- $ref: referencefile.schema
- $ref: keyword_exptype.schema
- type: object
  properties:
    ifucubepars_table:
      title: default IFU cube  parameters table
      fits_hdu: CUBEPAR
      datatype:
      - name: channel
        datatype: [ascii,3]
      - name: band
        datatype: [ascii, 12]
      - name: spaxelsize
        datatype: float32
      - name: spectralstep
        datatype: float32
      - name: wavemin
        datatype: float32
      - name: wavemax
        datatype: float32
    ifucubepars_table_units:
      type: object
      properties:
        channel:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR
        band:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR
        spaxelsize:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR
          default: "arcsec"
        spectralstep:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR
          default: "micron"
        wavemin:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR
          default: "micron"
        wavemax:
          type: string
          fits_keyword: TUNIT6
          fits_hdu: CUBEPAR
          default: "micron"
    ifucubepars_msm_table:
      title: default IFU cube msm parameters table
      fits_hdu: CUBEPAR_MSM
      datatype:
      - name: channel
        datatype: [ascii,3]
      - name: band
        datatype: [ascii, 12]
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_msm_table_units:
      type: object
      properties:
        channel:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR_MSM
        band:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR_MSM
        roispatial:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR_MSM
        softrad:
          type: string
          fits_keyword: TUNIT6
          fits_hdu: CUBEPAR_MSM
          default: "arcsec"
    ifucubepars_multichannel_msm_wavetable:
      title: default IFU cube multi channel msm  wavetable
      fits_hdu: MULTICHANNEL_MSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_multichannel_msm_wavetable_units:
      type: object
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHANNEL_MSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHANNEL_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHANNEL_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHANNEL_MSM
        softrad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: MULTICHANNEL_MSM
          default: "arcsec"
    ifucubepars_emsm_table:
      title: default IFU cube emsm parameters table
      fits_hdu: CUBEPAR_EMSM
      datatype:
      - name: channel
        datatype: [ascii,3]
      - name: band
        datatype: [ascii, 12]
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: scalerad
        datatype: float32
    ifucubepars_emsm_table_units:
      type: object
      properties:
        channel:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR_EMSM
        band:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR_EMSM
        roispatial:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR_EMSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR_EMSM
          default: "micron"
        scalerad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR_EMSM
          default: "arcsec"
    ifucubepars_multichannel_emsm_wavetable:
      title: default IFU cube multi channel emsm wavetable
      fits_hdu: MULTICHANNEL_EMSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: scalerad
        datatype: float32
    ifucubepars_multichannel_emsm_wavetable_units:
      type: object
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHANNEL_EMSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHANNEL_EMSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHANNEL_EMSM
          default: "micron"
        scalerad:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHANNEL_EMSM
          default: "arcsec"
    ifucubepars_multichannel_driz_wavetable:
      title: default IFU cube multi channel driz wavetable
      fits_hdu: MULTICHANNEL_DRIZ
      datatype:
      - name: wavelength
        datatype: float32
    ifucubepars_multichannel_driz_wavetable_units:
      type: object
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHANNEL_DRIZ
          default: "micron"
