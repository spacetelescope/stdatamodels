%YAML 1.1
---
$schema: "http://stsci.edu/schemas/asdf/asdf-schema-1.1.0"
id: "http://stsci.edu/schemas/jwst_datamodel/nirspec_ifucubepars.schema"
title: Default NIRSPEC IFU cube parameters data model
allOf:
- $ref: referencefile.schema
- $ref: keyword_exptype.schema
- $ref: keyword_lampmode.schema
- type: object
  properties:
    ifucubepars_table:
      title: default IFU cube  parameters table
      fits_hdu: CUBEPAR
      datatype:
      - name: disperser
        datatype: [ascii,5]
      - name: filter
        datatype: [ascii, 6]
      - name: wavemin
        datatype: float32
      - name: wavemax
        datatype: float32
      - name: spaxelsize
        datatype: float32
      - name: spectralstep
        datatype: float32
    ifucubepars_table_units:
      properties:
        disperser:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR
        filter:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR
        wavemin:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR
          default: "micron"
        wavemax:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR
          default: "micron"
        spaxelsize:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR
          default: "arcsec"
        spectralstep:
          type: string
          fits_keyword: TUNIT6
          fits_hdu: CUBEPAR
          default: "micron"
    ifucubepars_msm_table:
      title: default IFU cube msn parameters table
      fits_hdu: CUBEPAR_MSM
      datatype:
      - name: disperser
        datatype: [ascii,5]
      - name: filter
        datatype: [ascii,6]
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_msm_table_units:
      properties:
        disperser:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR_MSM
        filter:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR_MSM
        roispatial:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR_MSM
        softrad:
          type: string
          fits_keyword: TUNIT6
          fits_hdu: CUBEPAR_MSM
          default: "arcsec"
    ifucubepars_prism_msm_wavetable:
      title: default IFU cube prism msm wavetable
      fits_hdu: MULTICHAN_PRISM_MSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_prism_msm_wavetable_units:
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHAN_PRISM_MSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHAN_PRISM_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHAN_PRISM_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHAN_PRISM_MSM
        softrad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: MULTICHAN_PRISM_MSM
          default: "arcsec"
    ifucubepars_med_msm_wavetable:
      title: default IFU cube med resolution msm  wavetable
      fits_hdu: MULTICHAN_MED_MSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_med_msm_wavetable_units:
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHAN_MED_MSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHAN_MED_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHAN_MED_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHAN_MED_MSM
        softrad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: MULTICHAN_MED_MSM
          default: "arcsec"
    ifucubepars_high_msm_wavetable:
      title: default IFU cube high resolution msm wavetable
      fits_hdu: MULTICHAN_HIGH_MSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: power
        datatype: float32
      - name: softrad
        datatype: float32
    ifucubepars_high_msm_wavetable_units:
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHAN_HIGH_MSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHAN_HIGH_MSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHAN_HIGH_MSM
          default: "micron"
        power:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHAN_HIGH_MSM
        softrad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: MULTICHAN_HIGH_MSM
          default: "arcsec"
    ifucubepars_emsm_table:
      title: default IFU cube emsm parameters table
      fits_hdu: CUBEPAR_EMSM
      datatype:
      - name: disperser
        datatype: [ascii,5]
      - name: filter
        datatype: [ascii,6]
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: scalerad
        datatype: float32
    ifucubepars_emsm_table_units:
      properties:
        disperser:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: CUBEPAR_EMSM
        filter:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: CUBEPAR_EMSM
        roispatial:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: CUBEPAR_EMSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: CUBEPAR_EMSM
          default: "micron"
        scalerad:
          type: string
          fits_keyword: TUNIT5
          fits_hdu: CUBEPAR_EMSM
          default: "arcsec"
    ifucubepars_prism_emsm_wavetable:
      title: default IFU cube emsm prism wavetable
      fits_hdu: MULTICHAN_PRISM_EMSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: scalerad
        datatype: float32
    ifucubepars_prism_emsm_wavetable_units:
      properties:
