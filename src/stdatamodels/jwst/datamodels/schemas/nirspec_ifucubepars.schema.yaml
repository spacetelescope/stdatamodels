          default: "micron"
        scalerad:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHAN_PRISM_EMSM
          default: "arcsec"
    ifucubepars_med_emsm_wavetable:
      title: default IFU cube emsm med resolution wavetable
      fits_hdu: MULTICHAN_MED_EMSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
        datatype: float32
      - name: roispectral
        datatype: float32
      - name: scalerad
        datatype: float32
    ifucubepars_med_emsm_wavetable_units:
      properties:
        wavelength:
          type: string
          fits_keyword: TUNIT1
          fits_hdu: MULTICHAN_MED_EMSM
          default: "micron"
        roispatial:
          type: string
          fits_keyword: TUNIT2
          fits_hdu: MULTICHAN_MED_EMSM
          default: "arcsec"
        roispectral:
          type: string
          fits_keyword: TUNIT3
          fits_hdu: MULTICHAN_MED_EMSM
          default: "micron"
        scalerad:
          type: string
          fits_keyword: TUNIT4
          fits_hdu: MULTICHAN_MED_EMSM
          default: "arcsec"
    ifucubepars_high_emsm_wavetable:
      title: default IFU cube emsm high resolution wavetable
      fits_hdu: MULTICHAN_HIGH_EMSM
      datatype:
      - name: wavelength
        datatype: float32
      - name: roispatial
