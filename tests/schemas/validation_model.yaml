$schema: http://stsci.edu/schemas/yaml-schema/draft-01
id: http://example.com/schemas/validation_model
title: Model with various kinds of validated properties.

allOf:
  - $ref: core_metadata
  - type: object
    properties:
      meta:
        type: object
        properties:
          string_attribute:
            type: string
          integer_attribute:
            type: integer
          object_attribute:
            type: object
            properties:
              string_attribute:
                type: string
          list_attribute:
            type: array
            items:
              type: object
              properties:
                string_attribute:
                  type: string
          list_of_data_attribute:
            type: array
            items:
              ndim: 2
              datatype: float32
              default: 0.0
          list_of_string_attribute:
            type: array
            items:
              type: string
...
