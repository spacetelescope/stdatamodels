[tool.towncrier]
filename = "CHANGES.rst"
directory = "changes/"
ignore = ["README.md"]
title_format = "{version} ({project_date})"
issue_format = "`#{issue} <https://github.com/spacetelescope/stdatamodels/issues/{issue}>`_"
wrap = true

[[tool.towncrier.type]]
directory = "breaking"
name = "Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "feature"
name = "New Features"
showcontent = true

[[tool.towncrier.type]]
directory = "fix"
name = "Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "Documentation Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "other"
name = "Other Changes"
showcontent = false
